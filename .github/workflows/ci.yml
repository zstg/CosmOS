name: Build ISOs

on:
  schedule:
    - cron: "0 0 * * *"  # Daily at midnight UTC
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: [hyprland, gnome]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Update repo
        run: nix flake update

      - name: Set build timestamp
        run: echo "BUILD_DATE=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Build ISO
        run: |
          nix build .#${{ matrix.flavor }}
          cp result/iso/*.iso ${{ matrix.flavor }}.iso  # mv doesn't work because the file is owned by the `nixbld` user
          chmod +w ${{ matrix.flavor }}.iso  # Ensure writable for upload
          rm -rf result/

      - name: Create Release (if first flavor)
        if: matrix.flavor == 'hyprland'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.BUILD_DATE }}
          name: "Nightly ${{ env.BUILD_DATE }}"
          body: Automated ISO release.
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ISO
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.flavor }}.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}