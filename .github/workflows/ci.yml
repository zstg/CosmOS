name: Build ISOs

on:
  schedule:
    - cron: "0 0 * * *"  # Daily at midnight UTC
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      build_date: ${{ steps.set_date.outputs.build_date }}
    steps:
      - name: Set build timestamp
        id: set_date
        run: echo "build_date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix with daemon
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            builders-use-substitutes = true
            keep-outputs = true
            keep-derivations = true

      - name: Update flake
        run: nix flake update

      - name: Cache Nix store
        uses: actions/cache@v3
        with:
          path: |
            /nix/store
            /etc/nix
          key: nix-${{ hashFiles('flake.lock') }}

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: [CosmOS-Hyprland, CosmOS-GNOME]
    steps:
      - name: Reuse checkout
        uses: actions/checkout@v4

      - name: Restore Nix environment
        uses: actions/cache@v3
        with:
          path: |
            /nix/store
            /etc/nix
          key: nix-${{ hashFiles('flake.lock') }}

      - name: Build ISO
        run: |
          nix build .#${{ matrix.flavor }}
          cp result/iso/*.iso ${{ matrix.flavor }}.iso

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./isos

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.setup.outputs.build_date }}
          files: |
            isos/CosmOS-Hyprland.iso
            isos/CosmOS-GNOME.iso
