; vim:ft=dosini

[settings]
screenchange-reload = true
pseudo-transparency = false
dim-value = 0.75
margin-top = 0
margin-bottom = 0
font-0 = JetBrainsMono NF ;6
; font-1 = FontAwesome;6
font-1= NotoColorEmoji
font-2= NotoColorEmoji
[colors]
background = #282c34
background-alt = #3e4452
foreground = #abb2bf
primary = #61afef
secondary = #8ABEB7
alert = #A54242
disabled = #cfd7e6

blue = #61AFEF
green = #97C277
light_grey = #3E4452
dark_grey = #282c34
purple = #C678DD
red = #E06C75
yellow = #E4BF7A 

[bar/example]
width = 100%
height = 24pt
radius = 6
; dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 4pt

border-size = 3pt
border-color = #00000000

padding-left = 0
padding-right = 1

; affects padding b/n modules
module-margin = 1.5 

separator = |
separator-foreground = ${colors.disabled}

; font-0 = monospace;2
font-0 = JetBrainsMono NF;6

modules-left = xworkspaces xwindow
modules-right = checkupdates pulseaudio memory cpu wlan date

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
tray-position = right
; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3
wm-restack = qtile
; qtile's default bar is hidden now
override-redirect = true 

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
reverse-scroll = true
label-active-background = ${colors.background-alt}
label-active-foreground = ${colors.blue}
label-active-underline= ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-occupied-foreground = ${colors.green}
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.purple}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
; increase <100> to increase length of chars that will be displayed for the title 
label = %title:0:100:...% 
label-empty = None 

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
label-mounted = %{F#E06C75}%mountpoint%%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = ÔĎ¶ 
label-muted-foreground = ${colors.blue}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
label-layout = %layout%
label-layout-foreground = ${colors.primary}
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM: "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

; mah custom module
[module/checkupdates]
type = custom/script
exec = checkupdates | wc -l
format-suffix = " %{F#61AFEF} ūüď¶ updates"
format-prefix-foreground = ${colors.purple}
click-left = "kitty --hold update-menu"

[module/battery]
type = custom/script
exec = polybattery
label = "%output%"
interval = 30

[module/backlight]
type = internal/backlight
; Use the following command to list available cards:
; $ ls -1 /sys/class/backlight/
card = intel_backlight

; Use the `/sys/class/backlight/.../actual-brightness` file
; rather than the regular `brightness` file.
; Defaults to true unless the specified card is an amdgpu backlight.
; New in version 3.6.0
use-actual-brightness = true

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU: "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#61AFEF}%ifname%%{F#E06C75} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
; label-connected = %{F#61AFEF}%ifname%%{F-} %essid% %local_ip%
label-connected = %{F#61AFEF}%essid%
click-left = nmtui

; [module/eth]
; inherit = network-base
; interface-type = wired
; label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1
date = DATE: %{F#CFD7E6}%d/%m | %{F#61AFEF}TIME: %{F#CFD7E6}%H:%M:%S
date-alt = %Y-%m-%d %{F#61AFEF}%H:%M:%S
label = %date%
label-foreground = ${colors.primary}

